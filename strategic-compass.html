<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кар'єрна Стратегія</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Geologica:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--o:#FF5500;--o2:#FF7733;--o3:#FFE4D6;--w:#FFFFFF;--d:#141414;--g:#767676;--g2:#EFEFED;}
body{font-family:'Geologica',sans-serif;background:#EDECEA;min-height:100vh;}

/* HEADER */
.hd{background:var(--d);padding:28px 44px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
.hd::after{content:'';position:absolute;right:0;top:0;bottom:0;width:220px;background:var(--o);clip-path:polygon(18% 0%,100% 0%,100% 100%,0% 100%);}
.hd-left{position:relative;z-index:1;}
.hd-left small{display:block;font-size:9px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--g);margin-bottom:5px;}
.hd-left h1{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;color:white;letter-spacing:-0.5px;line-height:1.25;}
.hd-right{position:relative;z-index:1;font-family:'Unbounded',sans-serif;font-size:16px;font-weight:900;color:white;letter-spacing:-0.5px;line-height:1.25;text-align:center;max-width:170px;}

/* TABS */
.tabs{display:flex;padding:24px 44px 0;}
.tab{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:12px 22px;border:none;cursor:pointer;transition:all .2s;}
.tab-on{background:var(--o);color:white;}
.tab-off{background:white;color:var(--g);}

/* DECK MODE */
#deck-mode{padding:36px 44px 60px;display:flex;gap:48px;align-items:flex-start;}

/* Stack */
.stack-wrap{position:relative;width:192px;flex-shrink:0;}
.stack{position:relative;width:192px;height:272px;cursor:pointer;}
.sl{position:absolute;inset:0;border-radius:14px;background:var(--o);transition:transform .2s;}
.sl:nth-child(1){transform:rotate(7deg);opacity:.18;}
.sl:nth-child(2){transform:rotate(3.5deg);opacity:.32;}
.sl:nth-child(3){transform:rotate(0);}
.stack:hover .sl:nth-child(1){transform:rotate(9deg) translateY(-3px);}
.stack:hover .sl:nth-child(2){transform:rotate(5deg) translateY(-2px);}
.stack:hover .sl:nth-child(3){transform:translateY(-5px);}
.sf{position:absolute;inset:0;border-radius:14px;background:var(--o);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;overflow:hidden;}
.sf::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 22px,rgba(255,255,255,.06) 22px,rgba(255,255,255,.06) 23px),repeating-linear-gradient(90deg,transparent,transparent 22px,rgba(255,255,255,.06) 22px,rgba(255,255,255,.06) 23px);}
.sf-logo{font-family:'Unbounded',sans-serif;color:white;text-align:center;position:relative;z-index:1;}
.sf-logo b{display:block;font-size:36px;font-weight:900;line-height:1;}
.sf-logo small{font-size:7px;font-weight:300;letter-spacing:3px;text-transform:uppercase;opacity:.7;margin-top:6px;display:block;}
.sf-dia{width:56px;height:56px;background:rgba(255,255,255,.15);transform:rotate(45deg);border-radius:6px;position:relative;z-index:1;}
.sf-cta{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.55);position:relative;z-index:1;}
.stack-cnt{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);background:var(--d);color:white;font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;}
.stack-hint{margin-top:30px;font-size:10px;color:var(--g);text-align:center;}

/* CARD */
.card-area{flex:1;}
.card-label{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--g);margin-bottom:20px;}
.card-wrap{width:100%;max-width:360px;}

.card{
  border-radius:18px;
  overflow:hidden;
  padding:28px 24px 24px;
  min-height:500px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  animation:reveal .45s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 24px 64px rgba(0,0,0,.14);
}
@keyframes reveal{from{opacity:0;transform:translateY(16px) rotate(-2deg) scale(.96);}to{opacity:1;transform:none;}}

.c-orange{background:var(--o);}
.c-white{background:white;}
.c-dark{background:var(--d);}
.c-stone{background:#F0EDE8;}

/* Card elements */
.card-cat{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:0;}
.c-orange .card-cat{background:rgba(255,255,255,.2);color:white;}
.c-white .card-cat{background:var(--o3);color:var(--o);}
.c-dark .card-cat{background:#2A2A2A;color:#888;}
.c-stone .card-cat{background:var(--o);color:white;}

.compass-wrap{width:100%;display:flex;justify-content:center;align-items:center;margin:20px 0;}

.card-title{font-family:'Unbounded',sans-serif;font-size:19px;font-weight:900;line-height:1.2;letter-spacing:-.5px;width:100%;text-align:center;}
.c-orange .card-title{color:white;}
.c-white .card-title{color:var(--d);}
.c-dark .card-title{color:white;}
.c-stone .card-title{color:var(--d);}

.card-sub{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-top:6px;width:100%;text-align:center;opacity:.55;}
.c-orange .card-sub{color:white;}
.c-white .card-sub{color:var(--d);}
.c-dark .card-sub{color:white;}
.c-stone .card-sub{color:var(--d);}

.card-line{height:1px;width:100%;margin:14px 0;opacity:.15;}
.c-orange .card-line{background:white;}
.c-white .card-line{background:var(--d);}
.c-dark .card-line{background:white;}
.c-stone .card-line{background:var(--d);}

.card-body{font-size:13px;line-height:1.75;font-weight:400;width:100%;text-align:center;flex:1;}
.c-orange .card-body{color:rgba(255,255,255,.88);}
.c-white .card-body{color:#444;}
.c-dark .card-body{color:#BBBBBB;}
.c-stone .card-body{color:#3A3530;}

.card-q{border-radius:10px;padding:14px 16px;margin-top:18px;width:100%;text-align:center;}
.c-orange .card-q{background:rgba(255,255,255,.15);}
.c-white .card-q{background:var(--o3);}
.c-dark .card-q{background:#222;}
.c-stone .card-q{background:rgba(255,85,0,.12);}

.card-ql{font-size:8px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:7px;opacity:.6;text-align:center;}
.c-orange .card-ql{color:white;}
.c-white .card-ql{color:var(--o);}
.c-dark .card-ql{color:var(--o);}
.c-stone .card-ql{color:var(--o);}

.card-qq{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;line-height:1.55;text-align:center;}
.c-orange .card-qq{color:white;}
.c-white .card-qq{color:var(--d);}
.c-dark .card-qq{color:white;}
.c-stone .card-qq{color:var(--d);}

.card-brand{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.35;margin-top:18px;text-align:center;width:100%;}
.c-orange .card-brand{color:white;}
.c-white .card-brand{color:var(--d);}
.c-dark .card-brand{color:white;}
.c-stone .card-brand{color:var(--d);}

/* CONTROLS */
.controls{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}
.btn{font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:13px 22px;border:none;cursor:pointer;transition:all .18s;border-radius:8px;}
.btn-p{background:var(--o);color:white;box-shadow:0 4px 18px rgba(255,85,0,.35);}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,85,0,.45);}
.btn-s{background:white;color:var(--d);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.btn-s:hover{transform:translateY(-2px);}
.btn-o{background:transparent;color:var(--g);border:1.5px solid #ccc;}
.btn-o:hover{border-color:var(--o);color:var(--o);}

/* GRID */
#grid-mode{display:none;padding:32px 44px 60px;}
.gfilters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px;}
.gf{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;border-radius:6px;border:1.5px solid transparent;cursor:pointer;transition:all .18s;background:white;color:var(--g);}
.gf.on{background:var(--o);color:white;}
.gf:not(.on):hover{border-color:var(--o);color:var(--o);}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.mini{border-radius:12px;padding:8px;cursor:pointer;transition:all .2s;aspect-ratio:2/3;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.mini:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 14px 36px rgba(0,0,0,.14);}
.mini-o{background:var(--o);box-shadow:0 2px 12px rgba(255,85,0,.2);}
.mini-w{background:white;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.mini-d{background:var(--d);box-shadow:0 2px 12px rgba(0,0,0,.2);}
.mini-s{background:#F0EDE8;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.mini-title{font-family:'Unbounded',sans-serif;font-size:9.5px;font-weight:700;line-height:1.3;text-align:center;}
.mini-o .mini-title{color:white;}
.mini-w .mini-title{color:var(--d);}
.mini-d .mini-title{color:white;}
.mini-s .mini-title{color:var(--d);}

@media(max-width:680px){
  #deck-mode{flex-direction:column;padding:24px;gap:32px;}
  .hd,.tabs,#grid-mode{padding-left:24px;padding-right:24px;}
  .tabs{padding-top:20px;}
}
</style>
</head>

<script>
const CARDS = [
{n:1,cat:'Стратегія',bg:'orange',title:'Горизонт лідера',sub:'Кар\'єрна стратегія · рівень 1',body:'Стратегія починається не з резюме, а з образу: хто ти за 5 років? Яка роль, яка компанія, який вплив? Чітке бачення горизонту дозволяє приймати рішення сьогодні, а не реагувати на обставини.',q:'Опишіть свою ідеальну позицію через 5 років — не посаду, а вплив і середовище.'},
{n:2,cat:'Стратегія',bg:'white',title:'Ваш унікальний профіль',sub:'Конкурентна перевага',body:'На ринку топменеджерів виграє не той, хто «кращий», а той, хто відрізняється. Ваш профіль — це перетин досвіду, стилю управління та результатів. Ця комбінація є у вас одна.',q:'Що є у вас, чого немає у 95% кандидатів на вашому рівні?'},
{n:3,cat:'Стратегія',bg:'dark',title:'Де ви створюєте цінність',sub:'Value proposition',body:'Компанії наймають не людей — вони наймають рішення проблем. Знайдіть типи завдань, де ваш вплив максимальний. Саме там — ваша стратегічна зона.',q:'За які результати вас запам\'ятають на кожному місці роботи?'},
{n:4,cat:'Стратегія',bg:'stone',title:'Ціль і напрямок',sub:'Орієнтири руху',body:'Ціль — конкретна і може зникнути. Напрямок — стійкий і не залежить від обставин. Лідери, що мають лише цілі, зупиняються, коли ціль недосяжна. Ті, що мають напрямок, — знаходять новий шлях.',q:'Якщо завтра ваша ціль зникне — куди ви рушите далі?'},
{n:5,cat:'Стратегія',bg:'orange',title:'Ринок вас не чекає',sub:'Проактивна позиція',body:'Ринок праці для топів — не оголошення на сайтах. 70% позицій закриваються через мережу. Ваша стратегія має бути активною: ви будуєте присутність, поки ще не шукаєте роботу.',q:'Чи знає ринок про вас більше, ніж ваш поточний роботодавець?'},
{n:6,cat:'Стратегія',bg:'white',title:'Рівень Csuite',sub:'Мислення вищого рівня',body:'Перехід до Срівня — це не про компетенції. Це про зміну мислення: від управління функцією до управління системою. Топменеджер бачить організацію як живий механізм, де кожне рішення має наслідки.',q:'Яке рішення ви приймаєте сьогодні, думаючи як CEO, а не як функціональний керівник?'},
{n:7,cat:'Позиціювання',bg:'dark',title:'Ваш кар\'єрний наратив',sub:'Storytelling лідера',body:'Кар\'єрна стратегія потребує наративу — зв\'язної історії, де кожен крок логічний і підсилює наступний. Якщо ви не керуєте своїм наративом, його придумає хтось інший.',q:'Розкажіть свою кар\'єру як один абзац. Чи звучить вона переконливо?'},
{n:8,cat:'Позиціювання',bg:'stone',title:'Репутація — ваш актив',sub:'Довгострокова цінність',body:'Репутація формується не на інтерв\'ю, а у щоденних взаємодіях: як ви приймаєте рішення, як реагуєте на кризи, як говорите про колег. Це ваш найдовговічніший актив.',q:'Що кажуть про вас колеги, коли вас немає в кімнаті?'},
{n:9,cat:'Позиціювання',bg:'orange',title:'Видимість на ринку',sub:'Присутність і вплив',body:'Невидимий лідер — це втрачені можливості. Публічна присутність: LinkedIn, виступи, статті — не марнославство, а стратегічна інвестиція. Вас повинні знати до того, як з\'явиться вакансія.',q:'Де і як ви демонструєте своє мислення публічно?'},
{n:10,cat:'Позиціювання',bg:'white',title:'Ніша vs Широкий профіль',sub:'Стратегічний вибір',body:'Бути сильним у всьому — значить бути посереднім у всьому. Топменеджери, що мають чітку нішу, отримують більш цільові пропозиції і більш цінні умови. Фокус — це конкурентна зброя.',q:'У якій темі ви готові бути найвідомішим фахівцем в Україні?'},
{n:11,cat:'Позиціювання',bg:'dark',title:'LinkedIn як інструмент',sub:'Цифрова присутність',body:'Профіль топменеджера — це не резюме, це живий документ вашого мислення. Кожен пост, кожен коментар формує образ лідера. Алгоритм винагороджує тих, хто думає вголос.',q:'Що ваш LinkedIn говорить про вас тим, хто вас ще не знає?'},
{n:12,cat:'Позиціювання',bg:'stone',title:'Перше враження лідера',sub:'Присутність і вплив',body:'На рівні топменеджменту перше враження формується за секунди — як на зустрічі, так і в профілі, і в листі. Це не зовнішність. Це ясність думки, впевненість тону і точність слова.',q:'Яке перше враження ви свідомо створюєте при знайомстві?'},
{n:13,cat:'Рішення',bg:'orange',title:'Залишитись або піти',sub:'Стратегічний вибір',body:'Залишатись з комфорту — повільна пастка. Іти зі страху — реактивне рішення. Стратегічне рішення базується на одному питанні: чи розвиває ця роль мій профіль у потрібному напрямку?',q:'Ця роль відкриває двері у вашому горизонті — чи закриває їх?'},
{n:14,cat:'Рішення',bg:'white',title:'Прорахований ризик',sub:'Управління невизначеністю',body:'Безпечне рішення не є безризиковим. Ризик не рости, не розширювати мережу, не будувати видимість — накопичується роками і коштує дорожче, ніж один невдалий крок вперед.',q:'Який ризик ви несете, нічого не змінюючи наступні 2 роки?'},
{n:15,cat:'Рішення',bg:'dark',title:'Інтуїція vs Аналітика',sub:'Якість рішень лідера',body:'Досвідчений лідер довіряє інтуїції не замість аналізу, а разом з ним. Інтуїція — це синтез тисяч спостережень. Коли дані говорять одне, а відчуття інше — варто зупинитись і послухати обидва.',q:'Яке рішення ви відкладаєте, хоча вже знаєте відповідь?'},
{n:16,cat:'Рішення',bg:'stone',title:'Коли говорити "ні"',sub:'Фокус і пріоритети',body:'Кожне "так" — це "ні" чомусь іншому. Лідери, що не вміють відмовляти, розмивають свій фокус і свою цінність. Стратегічне "ні" — це захист найважливіших "так" у вашій кар\'єрі.',q:'Від чого вам потрібно відмовитись, щоб зосередитись на головному?'},
{n:17,cat:'Зростання',bg:'orange',title:'Наступний рівень',sub:'Кар\'єрний стрибок',body:'Перехід на наступний рівень потребує не більше зусиль — а іншого мислення. Те, що зробило вас успішним на поточному рівні, може стати обмеженням на наступному. Ріст вимагає переосмислення.',q:'Яку звичку або підхід вам потрібно змінити для переходу на рівень вище?'},
{n:18,cat:'Зростання',bg:'white',title:'Розрив між рівнями',sub:'Gap аналіз',body:'Між вашим поточним рівнем і бажаним є конкретний розрив: навички, мережа, видимість, досвід. Не відчуття — а конкретні прогалини. Стратегія — це план їх закриття.',q:'Що конкретно вам бракує для переходу на наступний рівень?'},
{n:19,cat:'Зростання',bg:'dark',title:'Зворотній зв\'язок',sub:'Розвиток лідера',body:'На топрівні чесний зворотній зв\'язок стає рідкістю — люди бояться говорити правду. Лідери, що активно його шукають і приймають без захисту, ростуть значно швидше за тих, хто уникає.',q:'Коли ви востаннє отримали чесний зворотній зв\'язок — і як відреагували?'},
{n:20,cat:'Зростання',bg:'stone',title:'Ментор і спарринг-партнер',sub:'Прискорення розвитку',body:'Найшвидший шлях до наступного рівня — вчитися у тих, хто вже там. Ментор скорочує ваш шлях на роки. Спарринг-партнер допомагає мислити ясніше. Обидва — стратегічна необхідність, не розкіш.',q:'Хто у вашому оточенні вже є на рівні, до якого ви прагнете?'},
{n:21,cat:'Зростання',bg:'orange',title:'Інвестиція в розвиток',sub:'ROI для лідера',body:'Час і ресурси у власний розвиток — єдина інвестиція з гарантованою дохідністю. Компетенції, мережа, мислення — це те, що залишається з вами після будь-якої зміни ролі чи компанії.',q:'Скільки відсотків свого часу ви інвестуєте у свій розвиток — не команди, а свій?'},
{n:22,cat:'Мережа',bg:'white',title:'Стратегічна мережа',sub:'Капітал зв\'язків',body:'Мережа топменеджера — це не кількість контактів, це якість і різноманіття. Потрібні люди з різних індустрій, рівнів і країн. Однорідна мережа дає однорідні можливості.',q:'Хто у вашій мережі відрізняється від вас найбільше — і де є слабкі місця?'},
{n:23,cat:'Мережа',bg:'dark',title:'Нетворкінг без маски',sub:'Автентичність у зв\'язках',body:'Нетворкінг як "корисний обмін" відчувається одразу і відштовхує. Найцінніші зв\'язки виникають з щирого інтересу до людини і готовності давати до того, як просити.',q:'Кому з вашої мережі ви можете допомогти прямо зараз — без жодної вигоди?'},

{n:25,cat:'Енергія',bg:'orange',title:'Ресурс як стратегія',sub:'Управління собою',body:'Лідер — це найважливіший ресурс компанії. Виснажений керівник приймає гірші рішення, формує гіршу культуру, показує гірші результати. Управління власним ресурсом — це не слабкість, це відповідальність.',q:'Що конкретно відновлює вашу енергію — і як регулярно ви це робите?'},

const BGCLS={orange:'c-orange',white:'c-white',dark:'c-dark',stone:'c-stone'};
const MINICLS={orange:'mini-o',white:'mini-w',dark:'mini-d',stone:'mini-s'};

let deck=[],drawn=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function init(){deck=shuffle([...CARDS]);drawn=0;updateCnt();}
function updateCnt(){
  const r=deck.length-drawn;
  document.getElementById('cnt').textContent=r+' карт';
  document.getElementById('stackEl').style.opacity=r===0?'0.4':'1';
}
function draw(){
  if(drawn>=deck.length){document.getElementById('clabel').textContent='Колоду вичерпано!';return;}
  const c=deck[drawn++];updateCnt();
  document.getElementById('clabel').textContent='Карта '+drawn+' із 30';
  document.getElementById('cbox').innerHTML=buildCard(c);
  document.getElementById('ctrls').style.display='flex';
  document.getElementById('hint').textContent='Натисни ще раз';
}
function shuffleDeck(){deck=shuffle([...CARDS]);drawn=0;updateCnt();document.getElementById('cbox').innerHTML='';document.getElementById('ctrls').style.display='none';document.getElementById('clabel').textContent='← Перемішано! Витягни карту';document.getElementById('hint').textContent='Натисни на колоду';}
function resetDeck(){shuffleDeck();}

function compass(bg){
  const cc={
    orange:{ring:'rgba(255,255,255,0.22)',tick:'rgba(255,255,255,0.4)',n1:'#FFFFFF',n2:'rgba(255,255,255,0.3)',dot:'#FFFFFF',ltr:'rgba(255,255,255,0.55)',inner:'#FF5500'},
    white:{ring:'rgba(255,85,0,0.15)',tick:'rgba(255,85,0,0.35)',n1:'#FF5500',n2:'rgba(255,85,0,0.2)',dot:'#FF5500',ltr:'rgba(255,85,0,0.4)',inner:'#FFFFFF'},
    dark:{ring:'rgba(255,255,255,0.1)',tick:'rgba(255,255,255,0.25)',n1:'#FF5500',n2:'rgba(255,85,0,0.25)',dot:'#FF5500',ltr:'rgba(255,255,255,0.25)',inner:'#141414'},
    stone:{ring:'rgba(255,85,0,0.15)',tick:'rgba(255,85,0,0.3)',n1:'#FF5500',n2:'rgba(255,85,0,0.18)',dot:'#FF5500',ltr:'rgba(255,85,0,0.4)',inner:'#F0EDE8'},
  }[bg];
  const ticks=Array.from({length:24},(_,i)=>{
    const a=i*15*Math.PI/180;
    const r1=i%6===0?40:i%3===0?43:45;
    const x1=(55+r1*Math.sin(a)).toFixed(1),y1=(55-r1*Math.cos(a)).toFixed(1);
    const x2=(55+50*Math.sin(a)).toFixed(1),y2=(55-50*Math.cos(a)).toFixed(1);
    const w=i%6===0?3:1.5;
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${cc.tick}" stroke-width="${w}"/>`;
  }).join('');
  return `<svg width="113" height="113" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="55" cy="55" r="50" stroke="${cc.ring}" stroke-width="3"/>
    <circle cx="55" cy="55" r="36" stroke="${cc.ring}" stroke-width="1.5"/>
    <circle cx="55" cy="55" r="11" stroke="${cc.ring}" stroke-width="2"/>
    ${ticks}
    <text x="55" y="8" text-anchor="middle" font-family="Unbounded,sans-serif" font-size="8" font-weight="900" fill="${cc.n1}">N</text>
    <text x="103" y="59" text-anchor="middle" font-family="Unbounded,sans-serif" font-size="7" font-weight="700" fill="${cc.ltr}">E</text>
    <text x="55" y="107" text-anchor="middle" font-family="Unbounded,sans-serif" font-size="7" font-weight="700" fill="${cc.ltr}">S</text>
    <text x="7" y="59" text-anchor="middle" font-family="Unbounded,sans-serif" font-size="7" font-weight="700" fill="${cc.ltr}">W</text>
    <polygon points="55,15 60,55 55,46 50,55" fill="${cc.n1}"/>
    <polygon points="55,95 60,55 55,64 50,55" fill="${cc.n2}"/>
    <circle cx="55" cy="55" r="6" fill="${cc.dot}"/>
    <circle cx="55" cy="55" r="3" fill="${cc.inner}"/>
  </svg>`;
}

function buildCard(c){
  const bg=BGCLS[c.bg];
  return `<div class="card ${bg}">
    <div style="width:100%;display:flex;justify-content:center;margin-bottom:16px;">
      <span class="card-cat">${c.cat}</span>
    </div>
    <div class="compass-wrap">${compass(c.bg)}</div>
    <div class="card-title">${c.title}</div>
    <div class="card-sub">${c.sub}</div>
    <div class="card-line"></div>
    <div class="card-body">${c.body}</div>
    <div class="card-q">
      <div class="card-ql">Запитай себе</div>
      <div class="card-qq">${c.q}</div>
    </div>
    <div class="card-brand">Стратегічний компас · Альона Кавка</div>
  </div>`;
}

function renderFilters(){
  const cats=['all',...new Set(CARDS.map(x=>x.cat))];
  document.getElementById('gfilters').innerHTML=cats.map(cat=>`<button class="gf${cat==='all'?' on':''}" onclick="filterGrid('${cat}',this)">${cat==='all'?'Усі':cat}</button>`).join('');
}
function filterGrid(cat,btn){document.querySelectorAll('.gf').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderGrid(cat);}
function openCard(n){setMode('deck');const c=CARDS.find(x=>x.n===n);document.getElementById('cbox').innerHTML=buildCard(c);document.getElementById('clabel').textContent='Карта #'+n;document.getElementById('ctrls').style.display='flex';window.scrollTo({top:0,behavior:'smooth'});}
function setMode(m){
  const d=document.getElementById('deck-mode'),g=document.getElementById('grid-mode');
  const t1=document.getElementById('t1'),t2=document.getElementById('t2');
  if(m==='deck'){d.style.display='flex';g.style.display='none';t1.className='tab tab-on';t2.className='tab tab-off';}
  else{d.style.display='none';g.style.display='block';t1.className='tab tab-off';t2.className='tab tab-on';renderFilters();renderGrid('all');}
}
init();

const PHRASES = [
  "Кар'єра топрівня — це не випадковість.",
  "Це архітектура. Це система. Це стратегія.",
  "30 карт, які допоможуть вам побудувати кар'єру навмисно — крок за кроком.",
  "Витягніть карту. Зупиніться. Запитайте себе.",
  "Ваш стратегічний компас — завжди під рукою.",
];

let pIdx = 0;
function nextPhrase() {
  const el = document.getElementById('w-phrase');
  el.style.opacity = '0';
  el.style.transform = 'translateY(12px)';
  setTimeout(() => {
    el.textContent = PHRASES[pIdx % PHRASES.length];
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    pIdx++;
  }, 400);
}

function closeWelcome() {
  const w = document.getElementById('welcome');
  w.style.transition = 'opacity .6s ease';
  w.style.opacity = '0';
  setTimeout(() => w.style.display = 'none', 600);
}

window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.getElementById('w-logo').style.opacity = '1';
    document.getElementById('w-logo').style.transform = 'translateY(0)';
  }, 300);
  setTimeout(() => {
    document.getElementById('w-line').style.width = '60px';
  }, 700);
  setTimeout(() => {
    nextPhrase();
    setInterval(nextPhrase, 3000);
  }, 1000);
  setTimeout(() => {
    document.getElementById('w-stats').style.opacity = '1';
    document.getElementById('w-stats').style.transform = 'translateY(0)';
  }, 1200);
  setTimeout(() => {
    document.getElementById('w-btn').style.opacity = '1';

  }, 1600);
});
